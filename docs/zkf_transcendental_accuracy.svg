<svg xmlns="http://www.w3.org/2000/svg" width="920" height="580" viewBox="0 0 920 580"
     font-family="'DejaVu Sans','Helvetica',sans-serif">
  <defs>
    <marker id="arr"  viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cc342a"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f9d57"/>
    </marker>
  </defs>

  <rect width="920" height="580" fill="#ffffff"/>

  <!-- ===================== Title ===================== -->
  <text x="40" y="30" font-size="17" font-weight="bold" fill="#1a1a1a">Transcendental accuracy: noise floor, round-bit cushion, mis-round band</text>
  <text x="40" y="50" font-size="11.5" fill="#666">Two paired budgets: ERR_GUARD = 8 (polynomial noise) + 4 (cushion) = GUARD = 12 fractional bits below WMAN (mantissa width).</text>

  <!-- ===================== Panel 1: bit layout ===================== -->
  <text x="40" y="86" font-size="13" font-weight="bold" fill="#1a1a1a">1.  Fixed-point datapath bit layout — where the polynomial noise sits below WMAN</text>

  <!-- Bit-position tick labels above strip -->
  <g font-size="10" fill="#444" text-anchor="middle">
    <line x1="80"  y1="103" x2="80"  y2="110" stroke="#444"/>
    <line x1="440" y1="103" x2="440" y2="110" stroke="#444"/>
    <line x1="560" y1="103" x2="560" y2="110" stroke="#444"/>
    <line x1="760" y1="103" x2="760" y2="110" stroke="#444"/>
    <text x="80"  y="98">MSB</text>
    <text x="440" y="98">WMAN</text>
    <text x="560" y="98">WMAN + 4</text>
    <text x="760" y="98">WMAN + 12  (LSB)</text>
  </g>

  <!-- WMAN region (gray) -->
  <rect x="80" y="110" width="360" height="36" fill="#eeeeee" stroke="#888" stroke-width="1.2"/>
  <text x="260" y="133" font-size="12" fill="#333" text-anchor="middle">WMAN significand bits  (returned result)</text>

  <!-- Cushion (green): 4 bits at 30 px each -->
  <rect x="440" y="110" width="120" height="36" fill="#bfe6ce" stroke="#1f9d57" stroke-width="1.4"/>
  <!-- Internal bit hints only at the very top of the strip so they don't cross the labels -->
  <g stroke="#1f9d57" stroke-width="0.8" opacity="0.5">
    <line x1="470" y1="110" x2="470" y2="116"/>
    <line x1="500" y1="110" x2="500" y2="116"/>
    <line x1="530" y1="110" x2="530" y2="116"/>
  </g>
  <text x="500" y="130" font-size="10.5" fill="#176c3c" text-anchor="middle">cushion</text>
  <text x="500" y="142" font-size="9.5"  fill="#176c3c" text-anchor="middle">4 bits</text>

  <!-- Noise floor (red): 8 bits at 25 px each -->
  <rect x="560" y="110" width="200" height="36" fill="#f6c9c3" stroke="#cc342a" stroke-width="1.4"/>
  <g stroke="#cc342a" stroke-width="0.8" opacity="0.45">
    <line x1="585" y1="110" x2="585" y2="116"/>
    <line x1="610" y1="110" x2="610" y2="116"/>
    <line x1="635" y1="110" x2="635" y2="116"/>
    <line x1="660" y1="110" x2="660" y2="116"/>
    <line x1="685" y1="110" x2="685" y2="116"/>
    <line x1="710" y1="110" x2="710" y2="116"/>
    <line x1="735" y1="110" x2="735" y2="116"/>
  </g>
  <text x="660" y="130" font-size="10.5" fill="#9c2118" text-anchor="middle">polynomial noise floor</text>
  <text x="660" y="142" font-size="9.5"  fill="#9c2118" text-anchor="middle">ERR_GUARD = 8 bits</text>

  <!-- GUARD bracket below -->
  <line x1="440" y1="156" x2="760" y2="156" stroke="#444" stroke-width="1.3"/>
  <line x1="440" y1="152" x2="440" y2="160" stroke="#444" stroke-width="1.3"/>
  <line x1="760" y1="152" x2="760" y2="160" stroke="#444" stroke-width="1.3"/>
  <text x="600" y="173" font-size="11.5" fill="#444" text-anchor="middle">GUARD = 12 fractional bits below WMAN  =  ERR_GUARD + 4</text>

  <!-- Round-bit callout (green): horizontal text below, positioned under the cushion. -->
  <!-- No arrow: the bracket above already pins the GUARD region; horizontal centering does the rest. -->
  <text x="500" y="196" font-size="10.5" fill="#176c3c" text-anchor="middle">round bit (1/2 ULP)</text>
  <text x="500" y="209" font-size="10"   fill="#176c3c" text-anchor="middle">+ 3 sticky-OR bits</text>

  <!-- Noise callout (red): horizontal text below, positioned under the noise region. -->
  <text x="660" y="196" font-size="10.5" fill="#9c2118" text-anchor="middle">|err|  &lt;  2^&#8722;(WMAN + ERR_GUARD)</text>
  <text x="660" y="209" font-size="10"   fill="#9c2118" text-anchor="middle">≈ 2^&#8722;(ERR_GUARD + 1) ULP</text>

  <!-- ===================== Panel 2: midpoint geometry ===================== -->
  <text x="40" y="252" font-size="13" font-weight="bold" fill="#1a1a1a">2.  Rounding boundary geometry — the mis-round danger band around each midpoint</text>
  <text x="40" y="269" font-size="10.5" fill="#666">Zoom to two adjacent representable significands A, B (1 ULP apart). A mis-round happens only when the true value lands inside the danger band around the midpoint.</text>

  <!-- Midpoint dashed line -->
  <line x1="460" y1="295" x2="460" y2="395" stroke="#999" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="460" y="288" font-size="11.5" fill="#555" text-anchor="middle">midpoint  M = (A + B) / 2   (the rounding boundary)</text>

  <!-- Band-width arrow above the strips -->
  <line x1="408" y1="307" x2="512" y2="307" stroke="#cc342a" stroke-width="1.3" marker-start="url(#arrR)" marker-end="url(#arrR)"/>
  <text x="460" y="301" font-size="10.5" fill="#9c2118" text-anchor="middle">danger band full width  ≤  2|err|     (shown ~20× exaggerated)</text>

  <!-- Safe / danger / safe strips -->
  <rect x="100" y="315" width="308" height="22" fill="#bfe6ce" opacity="0.55"/>
  <rect x="408" y="315" width="104" height="22" fill="#f6c9c3" stroke="#cc342a" stroke-width="1.3"/>
  <rect x="512" y="315" width="308" height="22" fill="#bfe6ce" opacity="0.55"/>

  <text x="254" y="330" font-size="11" fill="#176c3c" text-anchor="middle">true value rounds to A  —  polynomial err can't flip it</text>
  <text x="666" y="330" font-size="11" fill="#176c3c" text-anchor="middle">true value rounds to B  —  polynomial err can't flip it</text>
  <text x="460" y="330" font-size="10" fill="#9c2118" text-anchor="middle">danger</text>

  <!-- Main axis -->
  <line x1="80" y1="360" x2="840" y2="360" stroke="#222" stroke-width="2"/>

  <!-- A and B endpoint ticks + dots -->
  <line x1="100" y1="350" x2="100" y2="370" stroke="#111" stroke-width="2.4"/>
  <circle cx="100" cy="360" r="4" fill="#111"/>
  <line x1="820" y1="350" x2="820" y2="370" stroke="#111" stroke-width="2.4"/>
  <circle cx="820" cy="360" r="4" fill="#111"/>

  <!-- M tick (smaller, not representable) -->
  <line x1="460" y1="356" x2="460" y2="364" stroke="#111" stroke-width="1.4"/>

  <g font-size="12" fill="#222" text-anchor="middle">
    <text x="100" y="384">A</text>
    <text x="460" y="384">M</text>
    <text x="820" y="384">B = A + ULP</text>
  </g>
  <g font-size="9.5" fill="#666" text-anchor="middle">
    <text x="100" y="396">representable</text>
    <text x="460" y="396">midpoint</text>
    <text x="820" y="396">representable</text>
  </g>

  <!-- ULP bracket -->
  <line x1="100" y1="416" x2="820" y2="416" stroke="#666" stroke-width="1.2"/>
  <line x1="100" y1="412" x2="100" y2="420" stroke="#666" stroke-width="1.2"/>
  <line x1="820" y1="412" x2="820" y2="420" stroke="#666" stroke-width="1.2"/>
  <text x="460" y="432" font-size="11" fill="#444" text-anchor="middle">1 ULP = 2^&#8722;(WMAN&#8722;1).  At ERR_GUARD = 8 the danger band spans at most 1/128 ULP (1/256 at the low end of the helper's [1, 2) interval).</text>

  <!-- ===================== Panel 3: rate vs ERR_GUARD ===================== -->
  <text x="40" y="456" font-size="13" font-weight="bold" fill="#1a1a1a">3.  Worst-case mis-round rate vs ERR_GUARD — and why 8 is the chosen point</text>

  <!-- Plot box axes -->
  <line x1="140" y1="475" x2="140" y2="558" stroke="#222" stroke-width="1.4"/>
  <line x1="140" y1="558" x2="660" y2="558" stroke="#222" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- y-axis grid (log scale: 100% at y=475, 0.001% at y=565 -> 5 decades / 90 px = 18 px per decade) -->
  <!-- 10%: y=475+18=493; 1%: 511; 0.1%: 529; 0.01%: 547; 0.001%: 565 -->
  <g stroke="#ddd" stroke-width="0.7" stroke-dasharray="2 2">
    <line x1="140" y1="475" x2="660" y2="475"/>
    <line x1="140" y1="493" x2="660" y2="493"/>
    <line x1="140" y1="511" x2="660" y2="511"/>
    <line x1="140" y1="529" x2="660" y2="529"/>
    <line x1="140" y1="547" x2="660" y2="547"/>
  </g>
  <g font-size="10" fill="#222" text-anchor="end">
    <text x="135" y="478">100%</text>
    <text x="135" y="496">10%</text>
    <text x="135" y="514">1%</text>
    <text x="135" y="532">0.1%</text>
    <text x="135" y="550">0.01%</text>
  </g>

  <!-- x-axis ticks: ERR_GUARD = 2..16, on the same 33.57-px-per-bit grid as the data points
       (so the chosen-point dashed line at x=371 lands exactly on the "8" label). -->
  <g font-size="10.5" fill="#222" text-anchor="middle">
    <text x="170" y="573">2</text>
    <text x="237" y="573">4</text>
    <text x="304" y="573">6</text>
    <text x="371" y="573">8</text>
    <text x="439" y="573">10</text>
    <text x="506" y="573">12</text>
    <text x="573" y="573">14</text>
    <text x="640" y="573">16</text>
  </g>
  <text x="668" y="562" font-size="10.5" fill="#444">ERR_GUARD</text>

  <!-- "faithful rounding fails" shaded zone, ERR_GUARD < ~4 -->
  <rect x="140" y="475" width="105" height="83" fill="#fdecea" opacity="0.6"/>
  <text x="192" y="485" font-size="10" fill="#9c2118" text-anchor="middle">faithful rounding</text>
  <text x="192" y="497" font-size="10" fill="#9c2118" text-anchor="middle">breaks here</text>

  <!-- Mis-round rate curve: rate = 2^-(ERR_GUARD-1) -->
  <!-- y(rate%) = 475 + (2 - log10(rate%)) * 18
       e=2  50%       y = 475 + (2-1.699)*18 = 480.4
       e=4  12.5%     y = 475 + 0.903*18    = 491.3
       e=6  3.125%    y = 475 + 1.505*18    = 502.1
       e=8  0.781%    y = 475 + 2.107*18    = 512.9
       e=10 0.195%    y = 475 + 2.710*18    = 523.8
       e=12 0.0488%   y = 475 + 3.312*18    = 534.6
       e=14 0.0122%   y = 475 + 3.913*18    = 545.4
       e=16 0.00305%  y = 475 + 4.515*18    = 556.3
       x: 2->170, 16->640, slope 33.57 px/bit  (4->237, 6->304, 8->371, 10->439, 12->506, 14->573)
  -->
  <polyline points="170,480 237,491 304,502 371,513 439,524 506,535 573,545 640,556"
            fill="none" stroke="#4a78d6" stroke-width="2.4"/>

  <g fill="#4a78d6">
    <circle cx="170" cy="480" r="3.2"/>
    <circle cx="237" cy="491" r="3.2"/>
    <circle cx="304" cy="502" r="3.2"/>
    <circle cx="439" cy="524" r="3.2"/>
    <circle cx="506" cy="535" r="3.2"/>
    <circle cx="573" cy="545" r="3.2"/>
    <circle cx="640" cy="556" r="3.2"/>
  </g>

  <!-- Chosen point highlighted -->
  <circle cx="371" cy="513" r="6.5" fill="#bfe6ce" stroke="#1f9d57" stroke-width="2.4"/>
  <line x1="371" y1="513" x2="371" y2="558" stroke="#1f9d57" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="381" y="488" font-size="11" fill="#176c3c" font-weight="bold">chosen: ERR_GUARD = 8</text>
  <text x="381" y="500" font-size="10" fill="#176c3c">worst-case ≤ 2^&#8722;7 ≈ 0.78%</text>

  <!-- Right-side commentary -->
  <g font-size="10.5" fill="#444">
    <text x="680" y="485">+1 bit of ERR_GUARD</text>
    <text x="680" y="499">halves the rate but</text>
    <text x="680" y="513">bumps poly degree.</text>
    <text x="680" y="532" fill="#9c2118">TMD at WMAN = 53 rules</text>
    <text x="680" y="546" fill="#9c2118">out a finite-budget zero rate.</text>
  </g>
</svg>
