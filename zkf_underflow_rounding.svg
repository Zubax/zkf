<svg xmlns="http://www.w3.org/2000/svg" width="920" height="580" viewBox="0 0 920 580"
     font-family="'DejaVu Sans','Helvetica',sans-serif">
  <defs>
    <marker id="arr"  viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cc342a"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f9d57"/>
    </marker>
  </defs>

  <rect width="920" height="580" fill="#ffffff"/>

  <!-- ===================== Title ===================== -->
  <text x="40" y="30" font-size="17" font-weight="bold" fill="#1a1a1a">Underflow handling: flush-to-zero  vs.  round-to-nearest {0, M}</text>
  <text x="40" y="50" font-size="11.5" fill="#666">M = MIN_NORMAL (smallest normal magnitude). This format generates no subnormals, so the interval (0, M) holds no representable values.</text>

  <!-- ===================== Panel A: representable grid ===================== -->
  <text x="40" y="86" font-size="13" font-weight="bold" fill="#1a1a1a">1.  Where a result can land — the representable grid</text>

  <!-- subnormal-gap shading -->
  <rect x="70" y="106" width="180" height="36" fill="#eaf0fb"/>

  <!-- axis -->
  <line x1="70" y1="124" x2="812" y2="124" stroke="#222" stroke-width="2" marker-end="url(#arr)"/>

  <!-- origin (0 is representable) -->
  <line x1="70" y1="106" x2="70" y2="142" stroke="#111" stroke-width="2.4"/>
  <circle cx="70" cy="124" r="3.2" fill="#111"/>

  <!-- ghost subnormal positions (would exist with denormals; not generated here) -->
  <line x1="115" y1="112" x2="115" y2="136" stroke="#4a78d6" stroke-width="1.6" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="160" y1="112" x2="160" y2="136" stroke="#4a78d6" stroke-width="1.6" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="205" y1="112" x2="205" y2="136" stroke="#4a78d6" stroke-width="1.6" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- normal ticks (red), spacing doubles each octave -->
  <g stroke="#cc342a" stroke-width="2.2">
    <line x1="250" y1="106" x2="250" y2="142"/>
    <line x1="295" y1="109" x2="295" y2="139"/>
    <line x1="340" y1="109" x2="340" y2="139"/>
    <line x1="385" y1="109" x2="385" y2="139"/>
    <line x1="430" y1="106" x2="430" y2="142"/>
    <line x1="520" y1="109" x2="520" y2="139"/>
    <line x1="610" y1="106" x2="610" y2="142"/>
    <line x1="700" y1="109" x2="700" y2="139"/>
    <line x1="790" y1="106" x2="790" y2="142"/>
  </g>

  <!-- numeric labels -->
  <g font-size="12" fill="#222" text-anchor="middle">
    <text x="70"  y="160">0</text>
    <text x="250" y="160">M</text>
    <text x="430" y="160">2M</text>
    <text x="610" y="160">3M</text>
    <text x="790" y="160">4M</text>
  </g>

  <!-- sub-notes -->
  <text x="160" y="180" font-size="10.5" fill="#4a78d6" text-anchor="middle">no representable values</text>
  <text x="160" y="192" font-size="10.5" fill="#4a78d6" text-anchor="middle">(would-be subnormals dashed)</text>
  <text x="340" y="180" font-size="10.5" fill="#888" text-anchor="middle">spacing M/4</text>
  <text x="610" y="180" font-size="10.5" fill="#888" text-anchor="middle">spacing M/2</text>

  <!-- zoom funnel into panel B -->
  <line x1="70"  y1="143" x2="70"  y2="214" stroke="#bbb" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="250" y1="143" x2="630" y2="214" stroke="#bbb" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="350" y="208" font-size="10" fill="#aaa" text-anchor="middle">zoom of (0, M)</text>

  <!-- ===================== Panel B: mapping rule ===================== -->
  <text x="40" y="234" font-size="13" font-weight="bold" fill="#1a1a1a">2.  How each rule maps a result that falls in (0, M)</text>

  <!-- half-M threshold -->
  <line x1="350" y1="246" x2="350" y2="372" stroke="#999" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="350" y="258" font-size="11" fill="#555" text-anchor="middle">½M (decision boundary)</text>

  <!-- OLD rule bar : everything -> 0 -->
  <rect x="70" y="266" width="560" height="22" fill="#f6c9c3" stroke="#cc342a" stroke-width="1.3"/>
  <text x="350" y="281" font-size="11.5" fill="#9c2118" text-anchor="middle">(0, M)  →  0</text>
  <text x="645" y="281" font-size="12" fill="#9c2118">flush-to-zero</text>

  <!-- NEW rule bar : split at half-M -->
  <rect x="70"  y="300" width="280" height="22" fill="#f6c9c3" stroke="#cc342a" stroke-width="1.3"/>
  <rect x="350" y="300" width="280" height="22" fill="#bfe6ce" stroke="#1f9d57" stroke-width="1.3"/>
  <text x="210" y="315" font-size="11.5" fill="#9c2118" text-anchor="middle">→ 0</text>
  <text x="490" y="315" font-size="11.5" fill="#176c3c" text-anchor="middle">→ M</text>
  <text x="645" y="315" font-size="12" fill="#176c3c">round-to-nearest</text>

  <!-- landing axis -->
  <line x1="70" y1="350" x2="630" y2="350" stroke="#222" stroke-width="1.6"/>
  <g stroke="#222" stroke-width="1.6">
    <line x1="70"  y1="345" x2="70"  y2="355"/>
    <line x1="350" y1="345" x2="350" y2="355"/>
    <line x1="630" y1="345" x2="630" y2="355"/>
  </g>
  <circle cx="70"  cy="350" r="4" fill="#111"/>
  <circle cx="630" cy="350" r="4" fill="#1f9d57"/>
  <g font-size="11.5" fill="#222" text-anchor="middle">
    <text x="70"  y="368">0</text>
    <text x="350" y="368">½M</text>
    <text x="630" y="368">M</text>
  </g>

  <!-- mapping arrows -->
  <path d="M150,289 Q92,320 76,346"  fill="none" stroke="#cc342a" stroke-width="1.3" marker-end="url(#arrR)"/>
  <path d="M210,323 Q120,338 78,348" fill="none" stroke="#cc342a" stroke-width="1.3" marker-end="url(#arrR)"/>
  <path d="M500,323 Q600,335 624,346" fill="none" stroke="#1f9d57" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- ===================== Panel C: error ===================== -->
  <text x="40" y="404" font-size="13" font-weight="bold" fill="#1a1a1a">3.  Resulting absolute error  |stored &#8722; exact|  across (0, M)</text>

  <!-- plot axes -->
  <line x1="70" y1="424" x2="70" y2="516" stroke="#222" stroke-width="1.4"/>
  <line x1="70" y1="516" x2="650" y2="516" stroke="#222" stroke-width="1.4"/>

  <!-- guide for half-M on x -->
  <line x1="350" y1="424" x2="350" y2="516" stroke="#ccc" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- max-error guide lines : old reaches M, new reaches M/2 -->
  <line x1="70" y1="432" x2="630" y2="432" stroke="#cc342a" stroke-width="1" stroke-dasharray="5 4" opacity="0.8"/>
  <line x1="70" y1="474" x2="630" y2="474" stroke="#1f9d57" stroke-width="1" stroke-dasharray="5 4" opacity="0.8"/>

  <!-- OLD error: ramp 0->M then cliff at M -->
  <polyline points="70,516 630,432 630,516" fill="none" stroke="#cc342a" stroke-width="2.4"/>
  <!-- NEW error: tent peaking at M/2 -->
  <polyline points="70,516 350,474 630,516" fill="none" stroke="#1f9d57" stroke-width="2.4"/>

  <!-- y labels -->
  <g font-size="11" fill="#222" text-anchor="end">
    <text x="62" y="436">M</text>
    <text x="62" y="478">½M</text>
    <text x="62" y="520">0</text>
  </g>
  <text x="34" y="474" font-size="11" fill="#222" text-anchor="middle" transform="rotate(-90 34,474)">|error|</text>

  <!-- x labels -->
  <g font-size="11.5" fill="#222" text-anchor="middle">
    <text x="70"  y="532">0</text>
    <text x="350" y="532">½M</text>
    <text x="630" y="532">M</text>
  </g>
  <text x="350" y="550" font-size="11" fill="#444" text-anchor="middle">exact result magnitude</text>

  <!-- curve callouts -->
  <text x="660" y="436" font-size="11.5" fill="#cc342a">flush-to-zero worst case = M</text>
  <text x="660" y="478" font-size="11.5" fill="#1f9d57">round-to-nearest worst case = M/2</text>
  <text x="660" y="500" font-size="11" fill="#444">round-to-nearest halves</text>
  <text x="660" y="513" font-size="11" fill="#444">the maximum error.</text>

  <!-- ===================== Legend ===================== -->
  <rect x="70"  y="562" width="13" height="11" fill="#f6c9c3" stroke="#cc342a" stroke-width="1"/>
  <text x="89"  y="572" font-size="11" fill="#333">→ 0  (underflow flushed to zero)</text>
  <rect x="300" y="562" width="13" height="11" fill="#bfe6ce" stroke="#1f9d57" stroke-width="1"/>
  <text x="319" y="572" font-size="11" fill="#333">→ M  (rounded up to MIN_NORMAL)</text>
  <line x1="560" y1="567" x2="585" y2="567" stroke="#4a78d6" stroke-width="1.6" stroke-dasharray="3 3"/>
  <text x="591" y="572" font-size="11" fill="#333">subnormal positions (not generated)</text>
</svg>
