name: diag
on: [push]

env:
  COCOTB_IGNORE_PYTHON_REQUIRES: "1"

concurrency:
  group: diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diag:
    runs-on: [self-hosted, ci-runner]
    container:
      image: containers.zubax.com/zubax-fpga-toolchain-mega:latest
      options: --user root --cap-add NET_ADMIN --cap-add SYS_PTRACE --shm-size 8g --volume /run/udev:/run/udev:ro
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - run: |
          set +e
          echo "== env =="; nproc; python3 -c "import os;print('affinity',len(os.sched_getaffinity(0)))"
          python3 -m pip install --break-system-packages -q py-spy 2>/dev/null
          echo "py-spy: $(command -v py-spy || echo none)"
          echo "== background sampler =="
          ( for i in $(seq 1 60); do
              echo "=== sample $i t=$(date +%T) load1=$(cut -d' ' -f1 /proc/loadavg) R_threads=$(ps -eL -o stat= | grep -c '^R') ==="
              echo "active: cc1plus=$(pgrep -xc cc1plus) verilator_bin=$(pgrep -xc verilator_bin) vvp=$(pgrep -xc vvp) iverilog=$(pgrep -xc iverilog)"
              for p in $(ps -eo pid,stat,comm | awk '$2 ~ /^[SD]/ && $3 ~ /python/ {print $1}' | head -6); do
                echo "--- py $p stat=$(ps -o stat= -p $p 2>/dev/null) wchan=$(cat /proc/$p/wchan 2>/dev/null) ---"
                cat /proc/$p/stack 2>/dev/null | head -4
                if command -v py-spy >/dev/null; then py-spy dump --pid $p --nonblocking 2>&1 | grep -aE 'Thread 0x|\.py:|in ' | sed -n '1,12p'; fi
              done
              sleep 4
            done ) > /tmp/sampler.log 2>&1 &
          SAMP=$!
          echo "== nox tests (sharded 1/20, timeboxed) =="
          FLOAT_SHARD=1/20 timeout 245 nox -s tests > /tmp/nox.log 2>&1; echo "nox rc=$?"
          kill $SAMP 2>/dev/null; wait 2>/dev/null
          echo "===== SAMPLER (tail) ====="; tail -140 /tmp/sampler.log
          echo "===== NOX TAIL ====="; tail -25 /tmp/nox.log
