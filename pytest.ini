[pytest]
# Config for the float verification matrix (float/tb/test_float_matrix.py, which drives FuseSoC).
# Deep/properties/fast tiers are deselected by default so a bare run, and `make verify-float`, exercise
# only the per-PR set; the Makefile targets override -m to select the heavier tiers explicitly.
# python_files is restricted so pytest never collects the cocotb test_*.py files (they run inside FuseSoC).
addopts = -m "not deep and not properties and not fast"
python_files = test_float_matrix.py
markers =
    pr: per-PR verification tier (the default selection)
    deep: full parameter-equivalence sweep (correctness on icarus, coverage on verilator); skipped unless -m deep
    properties: algebraic-property tests on add/addsub/mul; skipped unless -m properties
    fast: smallest-config smoke tier; skipped unless -m fast
    icarus: Icarus Verilog correctness run
    verilator: Verilator coverage-collecting run
